<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rezeptbuch</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --kern-blue: #003064;
      --kern-blue-light: #e6edf5;
      --kern-text-default: #1a1a1a;
      --kern-text-muted: #595959;
      --kern-bg-default: #f4f4f4;
      --kern-bg-surface: #ffffff;
      --kern-border: #767676;
      --kern-border-light: #d0d0d0;
      --kern-action: #003064;
      --kern-action-hover: #00204a;
      --kern-focus: #003064;
      --kern-success: #1a6b3c;
      --kern-warning: #7a4800;
      --kern-warning-bg: #fff3e0;
      --kern-radius: 4px;
      --kern-font: 'Fira Sans', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--kern-font); background: var(--kern-bg-default); color: var(--kern-text-default); font-size: 1rem; line-height: 1.5; }
    .app { max-width: 960px; margin: 0 auto; }
    .kern-header { background: var(--kern-blue); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    .kern-logo { color: #fff; font-size: 1.125rem; font-weight: 600; }
    .kern-logo span { font-weight: 400; opacity: .8; }
    .kern-main { padding: 24px; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: var(--kern-radius); font-family: var(--kern-font); font-size: 1rem; font-weight: 500; cursor: pointer; border: 2px solid transparent; }
    .btn-primary { background: var(--kern-action); color: #fff; border-color: var(--kern-action); }
    .btn-primary:hover { background: var(--kern-action-hover); }
    .btn-secondary { background: var(--kern-bg-surface); color: var(--kern-action); border-color: var(--kern-action); }
    .btn-secondary:hover { background: var(--kern-blue-light); }
    .btn-ghost { background: transparent; color: var(--kern-action); border-color: transparent; }
    .btn-ghost:hover { background: var(--kern-blue-light); }
    .btn-header { color: #fff; border-color: #fff; background: transparent; font-family: var(--kern-font); font-size: .875rem; font-weight: 500; cursor: pointer; padding: 6px 12px; border-radius: var(--kern-radius); border: 2px solid #fff; display: inline-flex; align-items: center; gap: 6px; }
    .btn-header:hover { background: rgba(255,255,255,0.15); }
    .btn-sm { padding: 6px 12px; font-size: .875rem; }
    .btn-icon { padding: 8px; }
    .search-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .kern-input { width: 100%; padding: 10px 12px; border-radius: var(--kern-radius); border: 2px solid var(--kern-border); background: var(--kern-bg-surface); color: var(--kern-text-default); font-size: 1rem; font-family: var(--kern-font); }
    .kern-input:focus { outline: 3px solid var(--kern-focus); outline-offset: 2px; border-color: var(--kern-focus); }
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
    .chip { padding: 6px 14px; border-radius: 20px; border: 2px solid var(--kern-border-light); background: var(--kern-bg-surface); color: var(--kern-text-muted); font-size: .875rem; font-family: var(--kern-font); cursor: pointer; font-weight: 500; }
    .chip:hover { border-color: var(--kern-action); color: var(--kern-action); }
    .chip.active { background: var(--kern-action); color: #fff; border-color: var(--kern-action); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
    .card { background: var(--kern-bg-surface); border: 1px solid var(--kern-border-light); border-left: 4px solid var(--kern-blue); border-radius: var(--kern-radius); padding: 16px; cursor: pointer; }
    .card:hover { border-color: var(--kern-action); border-left-color: var(--kern-action); }
    .card:focus { outline: 3px solid var(--kern-focus); outline-offset: 2px; }
    .card-cat { font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--kern-text-muted); margin-bottom: 4px; }
    .card-title { font-size: 1.125rem; font-weight: 600; margin-bottom: 4px; line-height: 1.3; }
    .card-meta { font-size: .875rem; color: var(--kern-text-muted); }
    .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
    .tag { font-size: .75rem; padding: 2px 8px; border-radius: 2px; background: var(--kern-blue-light); color: var(--kern-blue); font-weight: 500; }
    .empty { text-align: center; padding: 48px 16px; color: var(--kern-text-muted); grid-column: 1/-1; }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,16,.55); display: flex; align-items: flex-start; justify-content: center; padding: 24px 16px; z-index: 100; overflow-y: auto; }
    .modal { background: var(--kern-bg-surface); border-radius: var(--kern-radius); border: 1px solid var(--kern-border-light); width: 100%; max-width: 640px; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 2px solid var(--kern-blue); position: sticky; top: 0; background: var(--kern-bg-surface); z-index: 1; }
    .modal-title { font-size: 1.3125rem; font-weight: 600; }
    .modal-body { padding: 20px; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; padding: 16px 20px; border-top: 1px solid var(--kern-border-light); }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: .875rem; font-weight: 600; margin-bottom: 6px; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px 12px; border-radius: var(--kern-radius); border: 2px solid var(--kern-border); background: var(--kern-bg-surface); color: var(--kern-text-default); font-size: 1rem; font-family: var(--kern-font); resize: vertical; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: 3px solid var(--kern-focus); outline-offset: 2px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-hint { font-size: .875rem; color: var(--kern-text-muted); margin-top: 4px; }
    .ai-box { background: var(--kern-blue-light); border-left: 4px solid var(--kern-blue); padding: 14px; margin-bottom: 16px; border-radius: 0 var(--kern-radius) var(--kern-radius) 0; }
    .ai-box p { font-size: .875rem; color: var(--kern-blue); font-weight: 500; margin-bottom: 8px; }
    .ai-input { width: 100%; padding: 10px 12px; border-radius: var(--kern-radius); border: 2px solid var(--kern-border); background: var(--kern-bg-surface); color: var(--kern-text-default); font-size: .875rem; font-family: var(--kern-font); resize: vertical; min-height: 70px; }
    .ai-input:focus { outline: 3px solid var(--kern-focus); outline-offset: 2px; }
    .detail-eyebrow { font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--kern-text-muted); margin-bottom: 6px; }
    .detail-title { font-size: 1.625rem; font-weight: 600; margin-bottom: 4px; line-height: 1.2; }
    .detail-source { font-size: .875rem; color: var(--kern-text-muted); margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--kern-border-light); }
    .section-label { font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--kern-text-muted); margin-bottom: 10px; margin-top: 20px; }
    .scale-row { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
    .scale-btn { width: 36px; height: 36px; border-radius: var(--kern-radius); border: 2px solid var(--kern-action); background: var(--kern-bg-surface); color: var(--kern-action); font-size: 20px; cursor: pointer; font-family: var(--kern-font); display: flex; align-items: center; justify-content: center; font-weight: 500; }
    .scale-btn:hover { background: var(--kern-blue-light); }
    .portions-display { font-size: 1rem; font-weight: 600; min-width: 90px; }
    .ing-list { list-style: none; border-top: 1px solid var(--kern-border-light); }
    .ing-list li { display: flex; align-items: baseline; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--kern-border-light); font-size: .875rem; }
    .ing-amount { min-width: 90px; font-weight: 600; color: var(--kern-blue); }
    .steps-list { list-style: none; }
    .step { display: flex; gap: 14px; margin-bottom: 16px; cursor: pointer; }
    .step-num { min-width: 28px; height: 28px; border-radius: 50%; background: var(--kern-blue); color: #fff; font-size: .875rem; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
    .step-text { font-size: 1rem; line-height: 1.6; }
    .step-done .step-num { background: var(--kern-success); }
    .step-done .step-text { color: var(--kern-text-muted); text-decoration: line-through; }
    .timer-btn { display: inline-flex; align-items: center; gap: 4px; margin-top: 6px; font-size: .875rem; padding: 4px 10px; border-radius: var(--kern-radius); background: var(--kern-warning-bg); color: var(--kern-warning); border: 1px solid var(--kern-warning); cursor: pointer; font-family: var(--kern-font); font-weight: 500; }
    .active-timer { font-size: .875rem; padding: 4px 10px; border-radius: var(--kern-radius); background: var(--kern-warning-bg); color: var(--kern-warning); font-weight: 600; margin-top: 4px; display: inline-block; border: 1px solid var(--kern-warning); }
    .cook-actions { display: flex; gap: 8px; margin-bottom: 16px; margin-top: 4px; }
    .notes-box { background: var(--kern-blue-light); border-left: 4px solid var(--kern-blue); padding: 12px 14px; border-radius: 0 var(--kern-radius) var(--kern-radius) 0; margin-top: 20px; font-size: .875rem; color: var(--kern-blue); }
    .notes-label { font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
    .divider { border: none; border-top: 1px solid var(--kern-border-light); margin: 16px 0; }
    .hidden { display: none; }
    .export-hint { font-size: .875rem; color: var(--kern-text-muted); margin-top: 8px; }
  </style>
</head>
<body>
<div class="app">
  <div class="kern-header">
    <div class="kern-logo">Rezept<span>buch</span></div>
    <button class="btn-header" onclick="openAdd()">+ Rezept hinzufügen</button>
  </div>
  <div class="kern-main">
    <div class="search-row">
      <input type="text" class="kern-input" id="search-input" placeholder="Nach Name oder Zutat suchen …" oninput="renderList()" aria-label="Rezepte durchsuchen">
    </div>
    <div class="filter-row" id="filter-row"></div>
    <div class="grid" id="recipe-grid"></div>
  </div>
</div>

<!-- Modal: Neues Rezept -->
<div id="modal-add" class="hidden">
  <div class="overlay" onclick="if(event.target===this)closeAdd()">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <span class="modal-title">Neues Rezept</span>
        <button class="btn btn-ghost btn-icon" onclick="closeAdd()">✕</button>
      </div>
      <div class="modal-body">
        <div class="ai-box">
          <p>Aus Text extrahieren – Rezepttext einfügen, KI übernimmt den Rest:</p>
          <textarea class="ai-input" id="ai-text" placeholder="Rezepttext hier einfügen …"></textarea>
          <div style="margin-top:10px;display:flex;align-items:center;gap:10px">
            <button class="btn btn-primary btn-sm" onclick="extractWithAI()">Extrahieren</button>
            <span id="ai-status" style="font-size:.875rem;color:var(--kern-text-muted)"></span>
          </div>
        </div>
        <hr class="divider">
        <div class="form-row">
          <div class="form-group"><label>Name</label><input type="text" id="f-name" placeholder="z. B. Heringssalat"></div>
          <div class="form-group"><label>Kategorie</label><select id="f-cat"><option>Hauptgericht</option><option>Vorspeise</option><option>Dessert</option><option>Frühstück</option><option>Salat</option><option>Snack</option><option>Getränk</option></select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Portionen</label><input type="number" id="f-portions" value="4" min="1"></div>
          <div class="form-group"><label>Quelle</label><input type="text" id="f-source" placeholder="z. B. Familienrezept"></div>
        </div>
        <div class="form-group"><label>Zutaten</label><textarea id="f-ingredients" rows="6" placeholder="Eine Zutat pro Zeile:&#10;200 g Aprikosen&#10;1 EL Honig"></textarea><div class="form-hint">Format: Menge Einheit Zutat – eine Zeile pro Zutat</div></div>
        <div class="form-group"><label>Zubereitung</label><textarea id="f-steps" rows="6" placeholder="Einen Schritt pro Zeile:&#10;Zwiebeln würfeln.&#10;Alles mischen."></textarea><div class="form-hint">Zeitangaben wie „15 Minuten" werden automatisch als Timer erkannt.</div></div>
        <div class="form-group"><label>Notizen</label><textarea id="f-notes" rows="2" placeholder="z. B. Zwingend zum Jahreswechsel servieren."></textarea></div>
        <div class="form-group"><label>Tags (Komma-getrennt)</label><input type="text" id="f-tags" placeholder="klassiker, silvester, vegetarisch"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeAdd()">Abbrechen</button>
        <button class="btn btn-primary" onclick="saveRecipe()">Rezept speichern</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Detail -->
<div id="modal-detail" class="hidden">
  <div class="overlay" onclick="if(event.target===this)closeDetail()">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <span class="modal-title" id="d-header">Rezept</span>
        <div style="display:flex;gap:6px">
          <button class="btn btn-ghost btn-sm" onclick="deleteRecipe()">Löschen</button>
          <button class="btn btn-ghost btn-icon" onclick="closeDetail()">✕</button>
        </div>
      </div>
      <div class="modal-body" id="detail-body"></div>
    </div>
  </div>
</div>

<script>
// ---------------------------------------------------------------
// REZEPTE – direkt eingebettet, kein fetch() nötig
// Neue Rezepte: in der App hinzufügen → exportieren → diese Liste
// in der HTML-Datei ersetzen und auf GitHub hochladen
// ---------------------------------------------------------------
const BASE_RECIPES = [
  {
    "id": "1",
    "name": "Halloumi mit geschmorten Aprikosen",
    "category": "Hauptgericht",
    "portions": 4,
    "basePortion": 4,
    "source": "ZEITmagazin – Elisabeth Raether",
    "ingredients": ["200 g Aprikosen","1 EL Honig","1 TL Balsamico","1 EL Olivenöl","1 TL Thymian","Salz","Pfeffer","250 g Halloumi","60 g Pekannüsse","2 TL Zucker","1 EL Wasser"],
    "steps": ["Pekannüsse in einer Pfanne bei mittlerer Hitze 2 Minuten anrösten.","Zucker und Wasser in die Pfanne geben und sofort rühren, bis sich der Zucker aufgelöst hat.","Nüsse auf Backpapier auskühlen lassen.","Balsamico, Olivenöl, Thymian, Salz und Pfeffer in einen kleinen Topf geben und 15 Minuten köcheln lassen.","Aprikosen halbieren und mit Honig und Öl 3 Minuten schmoren.","Halloumi von beiden Seiten mit Öl bepinseln und goldbraun braten.","Halloumi auf Tellern anrichten, Aprikosen dazulegen, mit der Soße beträufeln und mit Nüssen bestreuen."],
    "notes": "",
    "tags": ["vegetarisch","sommer"]
  },
  {
    "id": "2",
    "name": "Heringssalat",
    "category": "Salat",
    "portions": 8,
    "basePortion": 8,
    "source": "Familienrezept",
    "ingredients": ["2-3 Zwiebeln","1 Jagdwurst","1 Packung Matjes","4-5 Äpfel","6 Eier (hartgekocht)","1 Glas Gewürzgurken"],
    "steps": ["Alle Zutaten in kleine Würfel schnippeln – \"klein\" heißt wirklich klein.","Alles gründlich mischen.","Am besten über Nacht ziehen lassen."],
    "notes": "Zwingend mindestens zum Jahreswechsel aufschneiden.",
    "tags": ["klassiker","silvester","familienrezept"]
  }
];

let activeRecipeId = null;
let timers = {};
let timerIntervals = {};

function getLocalAdditions() {
  return JSON.parse(localStorage.getItem('rezeptbuch_local') || '[]');
}
function saveLocalAddition(r) {
  const a = getLocalAdditions();
  a.unshift(r);
  localStorage.setItem('rezeptbuch_local', JSON.stringify(a));
}
function getAllRecipes() {
  return [...getLocalAdditions(), ...BASE_RECIPES];
}

function renderList() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const ac = document.querySelector('.chip.active');
  const activeCat = ac ? ac.dataset.cat : '';
  const all = getAllRecipes();
  const cats = [...new Set(all.map(r => r.category))].filter(Boolean);

  document.getElementById('filter-row').innerHTML =
    '<button class="chip' + (activeCat === '' ? ' active' : '') + '" data-cat="" onclick="filterCat(this)">Alle</button>' +
    cats.map(c => '<button class="chip' + (activeCat === c ? ' active' : '') + '" data-cat="' + c + '" onclick="filterCat(this)">' + c + '</button>').join('');

  const filtered = all.filter(r => {
    const mq = !q || r.name.toLowerCase().includes(q) ||
      (r.ingredients || []).some(i => i.toLowerCase().includes(q)) ||
      (r.tags || []).some(t => t.toLowerCase().includes(q));
    return mq && (!activeCat || r.category === activeCat);
  });

  const grid = document.getElementById('recipe-grid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty"><p>Keine Rezepte gefunden.</p></div>';
    return;
  }
  grid.innerHTML = filtered.map(r => `
    <div class="card" tabindex="0" onclick="openDetail('${r.id}')" onkeydown="if(event.key==='Enter')openDetail('${r.id}')">
      <div class="card-cat">${r.category || ''}</div>
      <div class="card-title">${r.name}</div>
      <div class="card-meta">${r.portions} Portionen${r.source ? ' · ' + r.source : ''}</div>
      ${r.tags && r.tags.length ? '<div class="card-tags">' + r.tags.map(t => '<span class="tag">' + t + '</span>').join('') + '</div>' : ''}
    </div>`).join('');
}

function filterCat(el) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function openAdd() { document.getElementById('modal-add').classList.remove('hidden'); }
function closeAdd() { document.getElementById('modal-add').classList.add('hidden'); clearForm(); }

function clearForm() {
  ['f-name','f-source','f-ingredients','f-steps','f-notes','f-tags','ai-text'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  document.getElementById('f-portions').value = '4';
  document.getElementById('ai-status').textContent = '';
  document.getElementById('f-cat').selectedIndex = 0;
}

function saveRecipe() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Bitte einen Namen eingeben.'); return; }
  const r = {
    id: 'local_' + Date.now(),
    name,
    category: document.getElementById('f-cat').value,
    portions: parseInt(document.getElementById('f-portions').value) || 4,
    basePortion: parseInt(document.getElementById('f-portions').value) || 4,
    source: document.getElementById('f-source').value.trim(),
    ingredients: document.getElementById('f-ingredients').value.trim().split('\n').map(s => s.trim()).filter(Boolean),
    steps: document.getElementById('f-steps').value.trim().split('\n').map(s => s.trim()).filter(Boolean),
    notes: document.getElementById('f-notes').value.trim(),
    tags: document.getElementById('f-tags').value.trim().split(',').map(s => s.trim()).filter(Boolean)
  };
  saveLocalAddition(r);
  closeAdd();
  renderList();
}

function deleteRecipe() {
  if (!confirm('Rezept wirklich löschen?')) return;
  const additions = getLocalAdditions().filter(r => r.id !== activeRecipeId);
  localStorage.setItem('rezeptbuch_local', JSON.stringify(additions));
  closeDetail();
  renderList();
}

function openDetail(id) {
  activeRecipeId = id;
  const r = getAllRecipes().find(x => x.id === id);
  if (!r) return;
  document.getElementById('d-header').textContent = r.name;
  renderDetail(r, r.portions);
  document.getElementById('modal-detail').classList.remove('hidden');
}

function closeDetail() {
  document.getElementById('modal-detail').classList.add('hidden');
  Object.values(timerIntervals).forEach(clearInterval);
  timerIntervals = {}; timers = {};
}

function renderDetail(r, cp) {
  const f = cp / r.basePortion;
  document.getElementById('detail-body').innerHTML = `
    <div class="detail-eyebrow">${r.category || ''}</div>
    <div class="detail-title">${r.name}</div>
    <div class="detail-source">${r.source || ''}${r.tags && r.tags.length ? ' · ' + r.tags.join(', ') : ''}</div>
    <div class="section-label">Portionen anpassen</div>
    <div class="scale-row">
      <button class="scale-btn" onclick="changePortions(-1)">−</button>
      <div class="portions-display">${cp} Portionen</div>
      <button class="scale-btn" onclick="changePortions(1)">+</button>
    </div>
    <div class="section-label" style="margin-top:20px">Zutaten</div>
    <ul class="ing-list">
      ${(r.ingredients || []).map(i => { const s = scaleIng(i, f); return '<li><span class="ing-amount">' + s.amount + '</span><span>' + s.name + '</span></li>'; }).join('')}
    </ul>
    <div class="section-label">Zubereitung</div>
    <div class="cook-actions">
      <button class="btn btn-secondary btn-sm" onclick="resetSteps()">↺ Zurücksetzen</button>
    </div>
    <div class="steps-list" id="steps-list">
      ${(r.steps || []).map((s, i) => renderStep(s, i)).join('')}
    </div>
    ${r.notes ? '<div class="notes-box"><div class="notes-label">Notizen</div>' + r.notes + '</div>' : ''}
    <hr class="divider" style="margin-top:24px">
    <button class="btn btn-secondary btn-sm" onclick="exportAll()">Alle Rezepte exportieren (JSON)</button>
    <p class="export-hint">Exportierte Datei als BASE_RECIPES in die index.html einfügen und auf GitHub hochladen.</p>`;
}

function renderStep(s, i) {
  const tm = s.match(/(\d+)\s*(?:bis\s*\d+\s*)?Minute[n]?/i);
  const ts = tm ? parseInt(tm[1]) * 60 : 0;
  return '<div class="step" id="step-' + i + '" onclick="toggleStep(' + i + ')">' +
    '<div class="step-num">' + (i + 1) + '</div>' +
    '<div><div class="step-text">' + s + '</div>' +
    (ts ? '<button class="timer-btn" onclick="startTimer(event,' + i + ',' + ts + ')">⏱ ' + tm[1] + ' min starten</button>' : '') +
    '<div class="active-timer hidden" id="timer-display-' + i + '"></div></div></div>';
}

function toggleStep(i) { const el = document.getElementById('step-' + i); if (el) el.classList.toggle('step-done'); }
function resetSteps() { document.querySelectorAll('.step').forEach(el => el.classList.remove('step-done')); }

function startTimer(e, i, secs) {
  e.stopPropagation();
  if (timerIntervals[i]) return;
  timers[i] = secs;
  const d = document.getElementById('timer-display-' + i);
  if (d) d.classList.remove('hidden');
  updateTimerDisplay(i);
  timerIntervals[i] = setInterval(() => {
    timers[i]--;
    if (timers[i] <= 0) {
      clearInterval(timerIntervals[i]); delete timerIntervals[i];
      const d = document.getElementById('timer-display-' + i);
      if (d) d.textContent = 'Fertig!';
      return;
    }
    updateTimerDisplay(i);
  }, 1000);
}

function updateTimerDisplay(i) {
  const d = document.getElementById('timer-display-' + i); if (!d) return;
  const m = Math.floor(timers[i] / 60), s = timers[i] % 60;
  d.textContent = m + ':' + s.toString().padStart(2, '0') + ' verbleibend';
}

function changePortions(delta) {
  const r = getAllRecipes().find(x => x.id === activeRecipeId); if (!r) return;
  r.portions = Math.max(1, (r.portions || r.basePortion) + delta);
  renderDetail(r, r.portions);
}

function scaleIng(ing, f) {
  const m = ing.match(/^([\d.,\/]+)\s*([a-zA-ZäöüÄÖÜ]*\.?)\s+(.+)$/);
  if (!m) return { amount: '', name: ing };
  const n = parseFloat(m[1].replace(',', '.'));
  const sc = n * f;
  const r = sc < 1 ? Math.round(sc * 10) / 10 : Math.round(sc * 4) / 4;
  return { amount: (r === Math.floor(r) ? r : r.toFixed(1)) + ' ' + (m[2] || ''), name: m[3] };
}

function exportAll() {
  const all = getAllRecipes();
  const blob = new Blob([JSON.stringify(all, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'rezepte-export.json';
  a.click();
}

renderList();
